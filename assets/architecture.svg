<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img" aria-label="architecture">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="920" height="360" rx="16" fill="url(#bg2)"/>

  <!-- LLM box -->
  <g transform="translate(40,120)">
    <rect width="180" height="100" rx="10" fill="#161b22" stroke="#7dffd0" stroke-width="2"/>
    <text x="90" y="38" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="16" font-weight="700" fill="#7dffd0">LLM / MCP host</text>
    <text x="90" y="62" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="12" fill="#8b949e">Claude · Cursor</text>
    <text x="90" y="80" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="12" fill="#8b949e">Continue · ...</text>
  </g>

  <!-- burp-mcp-plus box -->
  <g transform="translate(330,90)">
    <rect width="260" height="160" rx="10" fill="#161b22" stroke="#ff8e3c" stroke-width="2"/>
    <text x="130" y="35" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="18" font-weight="700" fill="#ff8e3c">burp-mcp-plus</text>
    <text x="130" y="60" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="11" fill="#8b949e">structured HTTP builder</text>
    <text x="130" y="80" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="11" fill="#8b949e">+ history sitemap</text>
    <text x="130" y="100" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="11" fill="#8b949e">+ collaborator wrapper</text>
    <text x="130" y="120" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="11" fill="#8b949e">+ dedup &amp; JS file index</text>
    <text x="130" y="142" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="10" fill="#6e7681">stdio MCP server (Python)</text>
  </g>

  <!-- Burp box -->
  <g transform="translate(700,120)">
    <rect width="180" height="100" rx="10" fill="#161b22" stroke="#00d4ff" stroke-width="2"/>
    <text x="90" y="38" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="16" font-weight="700" fill="#00d4ff">Burp Suite</text>
    <text x="90" y="62" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="12" fill="#8b949e">Repeater · Intruder</text>
    <text x="90" y="80" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="12" fill="#8b949e">Collaborator · ...</text>
  </g>

  <!-- arrows top: LLM ↔ wrapper -->
  <line x1="220" y1="155" x2="328" y2="155" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="185" x2="328" y2="185" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)"/>
  <text x="274" y="143" text-anchor="middle" font-family="ui-monospace, monospace"
        font-size="11" fill="#7dffd0">stdio MCP</text>

  <!-- arrows: wrapper ↔ Burp -->
  <line x1="590" y1="155" x2="698" y2="155" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="590" y1="185" x2="698" y2="185" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)"/>
  <text x="644" y="143" text-anchor="middle" font-family="ui-monospace, monospace"
        font-size="11" fill="#00d4ff">SSE :9876</text>

  <!-- Local files -->
  <g transform="translate(330,290)">
    <rect width="260" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="130" y="22" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="13" fill="#f0f6fc">deduped_requests.txt · _manifest.csv</text>
    <text x="130" y="40" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="11" fill="#8b949e">ingested locally · greppable · token-thrifty</text>
  </g>
  <line x1="460" y1="250" x2="460" y2="289" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
